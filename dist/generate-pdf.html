    // Funções auxiliares para formatação do PDF
    function addTextWithWrap(doc, text, x, y, maxWidth = 130) {
      const splitText = doc.splitTextToSize(text, maxWidth);
      let currentY = y;
      
      for (let i = 0; i < splitText.length; i++) {
        if (currentY > 297) { // A5 landscape height
          doc.addPage();
          currentY = 10;
        }
        doc.setFontSize(11);
        doc.text(splitText[i], x, currentY);
        currentY += 5; // Espaçamento entre linhas
      }
    }

    function addSection(doc, title, content) {
      if (doc.internal.pageSize.height - currentY < 20) {
        doc.addPage();
        currentY = 10;
      }
      
      // Título da seção
      const headerColor = [41, 128, 185];
      doc.setFillColor(...headerColor);
      doc.rect(10, currentY, 200, 3, 'F');
      
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text(title, 15, currentY + 4);
      
      // Conteúdo
      const separatorColor = [33, 33, 33];
      doc.setTextColor(...separatorColor);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      addTextWithWrap(doc, content, 15, currentY + 8);
      
      return currentY + 20;
    }

    let currentY = 20;

    function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [148, 210] // A5 landscape para mais espaço
      });

      // Cabeçalho
      const headerColor = [41, 128, 185];
      doc.setFillColor(...headerColor);
      doc.rect(0, 0, 210, 15, 'F');
      
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(16);
      doc.setFont('helvetica', 'bold');
      doc.text('RESUMO DAS PÁGINAS DO FAZENDINHA APP', 10, 8, null, null, 'center');
